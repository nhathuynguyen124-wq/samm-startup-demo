name: DevSecOps Pipeline (Cấu hình nâng cấp SAMM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scans:
    name: Kiểm tra An ninh Mã nguồn (OWASP SAMM Level 2)
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Tải mã nguồn về máy ảo
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # Bước 2: Quét bảo mật toàn bộ thư mục một cách độc lập
      - name: Chạy quét bảo mật TruffleHog (Sửa lỗi kẹt Commit)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
